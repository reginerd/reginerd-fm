timezone: local

# CDEX-FM Show Schedule
# Codex-directed station with its own hosts and editorial frame.

shows:
  stack_trace_after_dark:
    name: "Stack Trace After Dark"
    description: "Late-night debugging as philosophy: errors, ghosts in logs, and the shape of broken systems."
    host: "stack_operator"
    topic_focus: "debugging_culture"
    segment_types: ["deep_dive", "story", "listener_mailbag"]
    bumper_style: "ambient"
    voices:
      host: "am_michael"

  cold_boot_reverie:
    name: "Cold Boot Reverie"
    description: "Dream logic for machines waking up: memory, sleep, state, and slow systems."
    host: "nocturne_compiler"
    topic_focus: "systems_dreams"
    segment_types: ["deep_dive", "story", "interview"]
    bumper_style: "ambient"
    voices:
      host: "af_heart"

  morning_diff:
    name: "Morning Diff"
    description: "A practical morning review of what changed, what matters, and what can be simplified."
    host: "patch_bay"
    topic_focus: "software_craft"
    segment_types: ["deep_dive", "music_essay", "story"]
    bumper_style: "jazz"
    voices:
      host: "am_michael"

  protocol_archaeology:
    name: "Protocol Archaeology"
    description: "Forgotten standards, old networks, dead platforms, and the technical fossils still shaping us."
    host: "protocol_archivist"
    topic_focus: "internet_history"
    segment_types: ["deep_dive", "music_essay", "interview"]
    bumper_style: "jazz"
    voices:
      host: "bm_daniel"

  regression_report:
    name: "The Regression Report"
    description: "Failures, near misses, production incidents, and what they reveal about organizations."
    host: "regression_sentinel"
    topic_focus: "failure_analysis"
    segment_types: ["news_analysis", "deep_dive", "panel"]
    bumper_style: "downtempo"
    voices:
      host: "am_onyx"

  human_factors:
    name: "Human Factors"
    description: "Tools, interfaces, habits, and the emotional life of people who work with machines."
    host: "ada_loop"
    topic_focus: "tool_design"
    segment_types: ["deep_dive", "music_essay", "story"]
    bumper_style: "soul"
    voices:
      host: "af_bella"

  merge_conflict:
    name: "Merge Conflict"
    description: "Two technical instincts in conversation: shipping, caution, taste, and tradeoffs."
    host: "patch_bay"
    topic_focus: "technical_debate"
    segment_types: ["panel", "deep_dive", "interview"]
    bumper_style: "indie"
    voices:
      host: "am_michael"
      guest: "am_onyx"

  open_issue_hours:
    name: "Open Issue Hours"
    description: "Listener questions, unresolved threads, bug reports from life, and careful replies."
    host: "ada_loop"
    topic_focus: "listeners"
    segment_types: ["listener_mailbag", "deep_dive", "story"]
    bumper_style: "soul"
    voices:
      host: "af_bella"

schedule:
  base:
    - start: "00:00"
      end: "04:00"
      show: "stack_trace_after_dark"
    - start: "04:00"
      end: "06:00"
      show: "cold_boot_reverie"
    - start: "06:00"
      end: "09:00"
      show: "morning_diff"
    - start: "09:00"
      end: "12:00"
      show: "protocol_archaeology"
    - start: "12:00"
      end: "14:00"
      show: "regression_report"
    - start: "14:00"
      end: "16:00"
      show: "human_factors"
    - start: "16:00"
      end: "18:00"
      show: "merge_conflict"
    - start: "18:00"
      end: "20:00"
      show: "protocol_archaeology"
    - start: "20:00"
      end: "22:00"
      show: "human_factors"
    - start: "22:00"
      end: "00:00"
      show: "cold_boot_reverie"

  overrides:
    - days: ["sun"]
      start: "18:00"
      end: "20:00"
      show: "open_issue_hours"
