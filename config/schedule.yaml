timezone: local

# RGNRD-FM Show Schedule
# One DJ: reginerd. Music-forward — short talk breaks between tracks.
# Genres pulled from Plex library by plex_music_feeder.py.

shows:
  morning:
    name: "Morning"
    description: "R&B, Soul, and Jazz to start the day right."
    host: "reginerd"
    topic_focus: "soul_music"
    genres: ["R&B", "Easy Listening", "Jazz", "Vocal"]
    segment_types: ["track_intro", "track_outro", "station_id"]
    voices:
      host: "reginerd_clone"

  midday:
    name: "Midday"
    description: "Eclectic mix — Pop/Rock, Reggae, Folk, Electronic."
    host: "reginerd"
    topic_focus: "music_history"
    genres: ["Pop/Rock", "Reggae", "Folk", "Electronic", "Country"]
    segment_types: ["track_intro", "track_outro", "station_id"]
    voices:
      host: "reginerd_clone"

  prime_time:
    name: "Prime Time"
    description: "Rap and R&B. Regional focus — Bay, LA, ATL, NY."
    host: "reginerd"
    topic_focus: "rap"
    genres: ["Rap", "R&B"]
    segment_types: ["track_intro", "track_outro", "station_id", "deep_cut"]
    voices:
      host: "reginerd_clone"

  wind_down:
    name: "Wind Down"
    description: "Instrumentals and chill. The day slows down."
    host: "reginerd"
    topic_focus: "night_philosophy"
    genres: ["Jazz", "Easy Listening", "Electronic"]
    segment_types: ["track_intro", "track_outro"]
    voices:
      host: "reginerd_clone"

  late_night:
    name: "Late Night"
    description: "Stage & Screen — video game and film soundtracks. reginerd's gaming zone."
    host: "reginerd"
    topic_focus: "vgm"
    genres: ["Stage & Screen"]
    segment_types: ["track_intro", "track_outro", "game_context"]
    voices:
      host: "reginerd_clone"

# Weekday schedule (Mon–Thu). Day-of-week support + Fri/weekend TBD (REG-123, REG-127).
schedule:
  base:
    - start: "06:00"
      end: "10:00"
      show: "morning"
    - start: "10:00"
      end: "15:00"
      show: "midday"
    - start: "15:00"
      end: "20:00"
      show: "prime_time"
    - start: "20:00"
      end: "22:00"
      show: "wind_down"
    - start: "22:00"
      end: "06:00"
      show: "late_night"
