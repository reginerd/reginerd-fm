default_station: rgnrd-fm

stations:
  rgnrd-fm:
    call_sign: RGNRD-FM
    agent:
      kind: claude
      command: claude
    paths:
      output_dir: output
      home_dir: ~/.rgnrd
      schedule_path: config/schedule.yaml
    stream:
      icecast_host: localhost
      icecast_port: 8000
      mount: /stream
      api_port: 8001
      source_password_env: RGNRD_SOURCE_PASSWORD
      source_password: rgnrd_source_2024
      stream_name: RGNRD-FM
      stream_genre: Hip-Hop / R&B / VGM
      stream_description: reginerd's record collection, on the air 24/7
