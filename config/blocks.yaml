# Per-block artist and tag filter rules.
#
# blocked_artists: case-insensitive match against Plex grandparentTitle.
#   Include name variants — Plex may differ from what you expect.
#
# lastfm_tags.blocked: artist must have 0 of these tags — hard exclude.
#   Fail-open: if Last.fm returns no tags for an artist, the track is included.
#
# boost_tags: Last.fm tags that add score bonus during curator selection.
#   Replaces the old lastfm_tags.allowed hard filter — tracks with matching
#   tags score higher but tracks without are still eligible.
#
# pool_size: max tracks to include in the vibe-matched pool written to manifest.

morning:
  segments: [show_intro, track_intro, music_essay, track_intro, show_outro]
  bpm_range: [55, 105]
  energy_max: 0.05
  pool_size: 400
  boost_tags:
    - soul
    - r&b
    - neo-soul
    - jazz
    - gospel
    - smooth
    - rnb
    - female vocalists
    - male vocalists

late_night:
  segments: [show_intro, track_intro, show_outro]
  bpm_range: [50, 115]
  energy_max: 0.18
  pool_size: 200
  lastfm_tags:
